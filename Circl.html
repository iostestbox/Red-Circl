<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Circl — Request an Invite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

  /* =========================================================
     DESIGN TOKENS — Party Productions ATX
     Concept: Austin nightlife meets founder/investor networking.
     Velvet-rope energy, poster-print type, ticket-stub signature.
     ========================================================= */
  :root{
    --bg:            #0A0A12;   /* near-black indigo night sky */
    --bg-soft:       #12111C;   /* slightly lifted panel bg */
    --surface:       #17162238; /* card surface (used with blur) */
    --surface-solid: #17162A;
    --hairline:      #2C2A3D;
    --hot:           #FF3D6E;   /* hot pink — energy / CTA */
    --hot-dim:       #C9285389;
    --gold:          #E8B84D;   /* gold — exclusivity / VIP */
    --text:          #F6F3ED;   /* warm off-white */
    --text-muted:    #9C98AA;
    --text-faint:    #6B6879;

    --display: 'Anton', 'Arial Narrow', sans-serif;
    --body:    'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:    'Space Mono', monospace;

    --radius: 14px;
    --container: 1080px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Ambient glow field behind everything */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(60% 45% at 18% 0%, rgba(255,61,110,0.16), transparent 60%),
      radial-gradient(50% 40% at 90% 15%, rgba(232,184,77,0.10), transparent 60%),
      radial-gradient(70% 60% at 50% 100%, rgba(255,61,110,0.08), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  a{ color:inherit; }
  img{ max-width:100%; display:block; }

  .wrap{
    max-width:var(--container);
    margin:0 auto;
    padding:0 24px;
    position:relative;
    z-index:1;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .hero .eyebrow{
    font-size:clamp(9.5px, 2.8vw, 12px);
    letter-spacing:clamp(0.05em, 0.4vw, 0.22em);
    white-space:normal; /* wrap as a safety net — never clip text off-screen */
  }

  /* =========================
     NAV
     ========================= */
  header.nav{
    position:sticky; top:0; z-index:50;
    backdrop-filter:blur(10px);
    background:rgba(10,10,18,0.72);
    border-bottom:1px solid var(--hairline);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap;
    row-gap:10px;
    padding:16px 24px;
    max-width:var(--container);
    margin:0 auto;
  }
  .logo{
    font-family:var(--display);
    letter-spacing:0.03em;
    font-size:clamp(14px, 4vw, 19px);
    text-transform:uppercase;
  }
  .logo span{ color:var(--hot); }

  /* =========================
     HERO
     ========================= */
  .hero{
    padding:88px 0 70px;
    position:relative;
  }
  .hero-inner{
    display:grid;
    gap:36px;
  }
  .hero h1{
    font-family:var(--display);
    text-transform:uppercase;
    font-weight:400;
    font-size:clamp(44px, 9vw, 96px);
    line-height:0.96;
    letter-spacing:0.01em;
  }
  .hero h1 .line2{
    color:var(--hot);
    display:block;
    -webkit-text-stroke:1.5px var(--hot);
  }
  .hero-form{
    max-width:640px;
    margin-top:4px;
  }
  .hero-form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 32px;
    margin-bottom:26px;
  }
  .hero-form .field label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .hero-form .field input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--hairline);
    border-radius:0;
    padding:10px 2px;
    color:var(--text);
    font-family:var(--body);
    font-size:15px;
    outline:none;
    transition:border-color .15s ease;
  }
  .hero-form .field input::placeholder{ color:var(--text-faint); }
  .hero-form .field input:focus{ border-bottom-color:var(--hot); }

  /* Skyline strip signature element */
  .skyline{
    width:100%;
    aspect-ratio: 1000 / 90; /* matches the SVG viewBox — scales without distortion */
    height:auto;
    max-height:64px;
    display:block;
    opacity:0.9;
  }

  /* =========================
     RSVP form fields (shared)
     ========================= */
  form{ display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:7px; }
  .field label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .field input{
    background:#0D0C16;
    border:1px solid var(--hairline);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-family:var(--body);
    font-size:15px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color:var(--text-faint); }
  .field input:focus{
    border-color:var(--hot);
    box-shadow:0 0 0 3px rgba(255,61,110,0.18);
  }
  .field input:invalid:not(:placeholder-shown){
    border-color:#B94A4A;
  }
  .two-col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  .submit-row{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }
  .submit-btn{
    font-family:var(--mono);
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    background:var(--hot);
    color:#170007;
    border:none;
    padding:11px 22px;
    border-radius:999px;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  }
  .submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px -8px rgba(255,61,110,0.6);
  }
  .submit-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .fine-print{
    font-size:12px;
    color:var(--text-faint);
  }

  .form-msg{
    display:none;
    margin-top:18px;
    padding:14px 16px;
    border-radius:10px;
    font-size:14px;
    font-family:var(--body);
  }
  .form-msg.success{
    display:block;
    background:rgba(232,184,77,0.10);
    border:1px solid rgba(232,184,77,0.4);
    color:var(--gold);
  }
  .form-msg.error{
    display:block;
    background:rgba(185,74,74,0.10);
    border:1px solid rgba(185,74,74,0.5);
    color:#E88888;
  }

  /* =========================
     RESPONSIVE
     ========================= */
  @media (max-width: 780px){
    .hero{ padding:44px 0 36px; }
    .hero-inner{ gap:26px; }
    .two-col{ grid-template-columns:1fr; }
    .hero-form-grid{ grid-template-columns:1fr; gap:16px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ scroll-behavior:auto !important; transition:none !important; }
  }

  /* keyboard focus visibility */
  a:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }
</style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <div class="logo">GROW<span>·</span>CONNECT<span>·</span>CREATE</div>
    </div>
  </header>

  <section class="hero" id="rsvp">
    <div class="wrap hero-inner">
      <div>
        <p class="eyebrow">Austin, TX</p>
        <h1>RED CIRCL<span class="line2">EVENTS</span></h1>
      </div>

      <form class="hero-form" id="rsvp-form" novalidate>
        <div class="hero-form-grid">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Jordan" required autocomplete="given-name">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="jordan@email.com" required autocomplete="email">
          </div>
          <div class="field">
            <label for="instagram">Instagram Handle</label>
            <input type="text" id="instagram" name="instagram" placeholder="@yourhandle" required>
          </div>
          <div class="field">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" placeholder="(512) 555-0134" required autocomplete="tel">
          </div>
        </div>

        <div class="submit-row">
          <button type="submit" class="submit-btn" id="submit-btn">Request Invite</button>
          <span class="fine-print">We'll never spam you. Promise.</span>
        </div>

        <div class="form-msg" id="form-msg"></div>
      </form>

      <svg class="skyline" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <rect x="0" y="40" width="30" height="50" fill="#1B1A28"/>
        <rect x="35" y="20" width="22" height="70" fill="#1F1E2E"/>
        <rect x="62" y="50" width="18" height="40" fill="#1B1A28"/>
        <rect x="90" y="10" width="26" height="80" fill="#221F33"/>
        <rect x="122" y="35" width="20" height="55" fill="#1B1A28"/>
        <rect x="150" y="0" width="16" height="90" fill="#26223A"/>
        <rect x="172" y="45" width="24" height="45" fill="#1F1E2E"/>
        <rect x="205" y="25" width="18" height="65" fill="#1B1A28"/>
        <rect x="230" y="55" width="30" height="35" fill="#221F33"/>
        <rect x="270" y="5" width="20" height="85" fill="#1F1E2E"/>
        <rect x="298" y="40" width="16" height="50" fill="#1B1A28"/>
        <circle cx="850" cy="20" r="10" fill="#E8B84D" opacity="0.35"/>
        <rect x="700" y="30" width="20" height="60" fill="#1B1A28"/>
        <rect x="728" y="12" width="24" height="78" fill="#221F33"/>
        <rect x="760" y="48" width="18" height="42" fill="#1F1E2E"/>
        <rect x="790" y="0" width="16" height="90" fill="#26223A"/>
        <rect x="812" y="38" width="26" height="52" fill="#1B1A28"/>
        <rect x="900" y="20" width="20" height="70" fill="#1F1E2E"/>
        <rect x="928" y="50" width="18" height="40" fill="#1B1A28"/>
        <rect x="955" y="15" width="24" height="75" fill="#221F33"/>
      </svg>
    </div>
  </section>

  <script>
    // -----------------------------------------------------------------
    // RSVP form handling.
    //
    // This currently just validates the form and shows a success state
    // in the browser — nothing is sent anywhere yet.
    //
    // TO CONNECT TO GOOGLE SHEETS LATER:
    // 1. Create a Google Apps Script Web App bound to your target Sheet
    //    that accepts a POST with JSON {firstName, email, instagram, mobile}
    //    and appends a row.
    // 2. Deploy it and copy the Web App URL.
    // 3. Paste that URL into GOOGLE_SHEET_ENDPOINT below.
    // 4. Uncomment the fetch() block inside handleSubmit().
    // -----------------------------------------------------------------
    const GOOGLE_SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbxzUyeLhre_GRvX1f3YaZ7oqyvW5tfx4XtHsjemBnWADbb1ql9Sb9Rghs5dRVBLHzyw0Q/exec";

    const form = document.getElementById('rsvp-form');
    const msgBox = document.getElementById('form-msg');
    const submitBtn = document.getElementById('submit-btn');

    function showMessage(text, type){
      msgBox.textContent = text;
      msgBox.className = 'form-msg ' + type;
    }

    function normalizeInstagram(value){
      const trimmed = value.trim();
      if(!trimmed) return trimmed;
      return trimmed.startsWith('@') ? trimmed : '@' + trimmed;
    }

    form.addEventListener('submit', async function(e){
      e.preventDefault();

      if(!form.checkValidity()){
        form.reportValidity();
        return;
      }

      const payload = {
        firstName: document.getElementById('firstName').value.trim(),
        email: document.getElementById('email').value.trim(),
        instagram: normalizeInstagram(document.getElementById('instagram').value),
        mobile: document.getElementById('mobile').value.trim(),
        // Standardized to Central Time (Austin) regardless of the submitter's
        // own device timezone, so every row in the sheet reads consistently.
        submittedAt: new Date().toLocaleString('en-US', {
          timeZone: 'America/Chicago',
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: true
        }) + ' CT'
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      msgBox.className = 'form-msg';

      try{
        await fetch(GOOGLE_SHEET_ENDPOINT, {
          method: 'POST',
          mode: 'no-cors', // Apps Script doesn't return CORS headers, so the
                            // response itself is opaque — we can't read success/
                            // failure from it. The row still gets appended.
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        showMessage("You're on the list. We'll be in touch with details soon.", 'success');
        form.reset();
      }catch(err){
        showMessage("Something went wrong submitting your request. Please try again.", 'error');
      }finally{
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Request';
      }
    });
  </script>

</body>
</html>
